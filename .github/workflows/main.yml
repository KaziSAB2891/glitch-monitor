name: Hourly Global Sync
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Run Scraper
        run: |
          pip install requests
          python scraper.py
      - name: Auto-Commit Deals
        run: |
          git config --global user.name "GlitchBot-Automated"
          git config --global user.email "bot@glitchmonitor.com"
          git add deals.json
          git commit -m "Automated Sync: $(date)" || exit 0
          git push
