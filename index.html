<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Glitch Terminal</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --glitch: #f85149; --text: #c9d1d9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; }
        .panel { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #30363d; }
        .market-list { display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 10px; padding: 15px; margin-bottom: 15px; position: relative; transition: 0.2s; }
        .card:hover { border-color: var(--accent); }
        .glitch-tag { position: absolute; top: -10px; right: 10px; background: var(--glitch); color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .price { font-size: 1.5rem; color: #fff; font-weight: bold; margin: 10px 0; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-sec { background: #30363d; margin-top: 10px; }
        input[type="checkbox"] { accent-color: var(--accent); scale: 1.2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel">
            <h2>🌍 Global Control</h2>
            <div class="market-list">
                <label><input type="checkbox" id="check-usa" checked onchange="refresh()"> USA</label>
                <label><input type="checkbox" id="check-bd" onchange="refresh()"> Bangladesh</label>
                <label><input type="checkbox" id="check-lt" onchange="refresh()"> Lithuania</label>
            </div>
            <hr style="border:0.5px solid #30363d">
            <label><input type="checkbox" id="glitch-only" onchange="refresh()"> 🚨 Only 90%+ Errors</label>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-sec" onclick="downloadPassport()">💾 Backup Rank</button>
                <button class="btn-sec" onclick="document.getElementById('p-upload').click()">📂 Restore</button>
            </div>
            <input type="file" id="p-upload" style="display:none" onchange="restorePassport(event)">
        </div>

        <div id="feed"></div>
        <div style="text-align:center; font-size:0.8rem; color:#8b949e; margin-top:20px;" id="sync-info">Connecting to server...</div>
    </div>

    <script>
        async function refresh() {
            const feed = document.getElementById('feed');
            try {
                const res = await fetch('deals.json?t=' + Date.now());
                const deals = await res.json();
                let filtered = document.getElementById('glitch-only').checked ? deals.filter(d => d.is_glitch) : deals;

                if (filtered.length === 0) {
                    feed.innerHTML = `<div class="panel" style="text-align:center;">No massive glitches right now. <button onclick="showAll()">Show All Deals</button></div>`;
                } else {
                    feed.innerHTML = filtered.map(d => `
                        <div class="card">
                            ${d.is_glitch ? '<div class="glitch-tag">PRICE ERROR</div>' : ''}
                            <div style="font-size:0.75rem; color:var(--accent)">${d.cat} • ${d.trust}</div>
                            <div style="margin: 8px 0; font-weight:bold; line-height:1.4;">${d.title}</div>
                            <div class="price">${calculatePrice(d.usd)}</div>
                            <button onclick="smartLaunch('${d.link}')">FAST BUY</button>
                        </div>
                    `).join('');
                }
                document.getElementById('sync-info').innerText = "Last sync: " + new Date().toLocaleTimeString();
            } catch (e) { feed.innerHTML = "Syncing with GitHub Robot..."; }
        }

        function calculatePrice(usd) {
            if (document.getElementById('check-bd').checked) return "৳" + Math.round(usd * 121 * 1.434).toLocaleString(); // 2026 BD TTI
            if (document.getElementById('check-lt').checked) return "€" + Math.round(usd * 0.92 * 1.21).toLocaleString(); // 2026 EU VAT
            return "$" + usd.toLocaleString();
        }

        function showAll() { document.getElementById('glitch-only').checked = false; refresh(); }

        function smartLaunch(url) {
            const start = Date.now();
            window.location.href = "amzn://apps/android?url=" + encodeURIComponent(url);
            setTimeout(() => { if (Date.now() - start < 1500) window.location.href = url; }, 1000);
        }

        function downloadPassport() {
            const blob = new Blob([JSON.stringify({karma: 100})], {type: "application/json"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Glitch_Passport.json"; a.click();
        }

        function restorePassport(e) {
            const reader = new FileReader();
            reader.onload = () => { alert("Verified Rank Restored!"); location.reload(); };
            reader.readAsText(e.target.files[0]);
        }

        window.onload = () => {
            if (!localStorage.getItem('v1_init')) {
                const choice = confirm("Sniper Mode Active! 🚨\n\nOK: Show only 90%+ Errors.\nCancel: Show all active deals.");
                document.getElementById('glitch-only').checked = choice;
                localStorage.setItem('v1_init', 'true');
            }
            refresh();
        };
    </script>
</body>
</html>
