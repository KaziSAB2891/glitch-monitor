<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Glitch Terminal v1.0</title>
    <style>
        :root { --bg: #0b0f19; --card: #161b22; --accent: #58a6ff; --glitch: #f85149; --text: #c9d1d9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: auto; }
        .control-panel { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #30363d; }
        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 15px 0; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 10px; padding: 15px; margin-bottom: 15px; position: relative; }
        .glitch-tag { position: absolute; top: -10px; right: 10px; background: var(--glitch); color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: bold; }
        .price-big { font-size: 1.4rem; color: #fff; font-weight: bold; margin: 10px 0; }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-sec { background: #30363d; margin-top: 10px; }
        .status { font-size: 0.8rem; color: #8b949e; text-align: center; margin-top: 10px; }
        input[type="checkbox"] { accent-color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <div class="control-panel">
            <h2 style="margin-top:0;">🌍 Global Control Center</h2>
            <div class="market-grid" id="market-checklist">
                <label><input type="checkbox" id="check-usa" checked onchange="refresh()"> USA Markets</label>
                <label><input type="checkbox" id="check-bd" onchange="refresh()"> Bangladesh</label>
                <label><input type="checkbox" id="check-lt" onchange="refresh()"> Lithuania (EU)</label>
            </div>
            <hr style="border: 0.5px solid #30363d;">
            <label><input type="checkbox" id="glitch-only" onchange="refresh()"> 🚨 Only 90%+ Errors</label>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-sec" onclick="downloadPassport()">💾 Backup Rank</button>
                <button class="btn-sec" onclick="document.getElementById('p-upload').click()">📂 Restore</button>
            </div>
            <input type="file" id="p-upload" style="display:none" onchange="restorePassport(event)">
        </div>

        <div id="deal-feed"></div>
        <div class="status" id="last-sync">Initial sync in progress...</div>
    </div>

    <script>
        async function refresh() {
            const feed = document.getElementById('deal-feed');
            const syncLabel = document.getElementById('last-sync');
            
            try {
                const res = await fetch('deals.json?nocache=' + Date.now());
                const deals = await res.json();
                
                let filtered = deals;
                if(document.getElementById('glitch-only').checked) {
                    filtered = deals.filter(d => d.is_glitch);
                }

                if (filtered.length === 0) {
                    feed.innerHTML = `<div style="text-align:center; padding:40px;">No glitches found in selected markets. Try unchecking "90% Only".</div>`;
                } else {
                    feed.innerHTML = filtered.map(d => `
                        <div class="card">
                            ${d.is_glitch ? '<div class="glitch-tag">PRICE ERROR</div>' : ''}
                            <div style="font-size:0.8rem; color:var(--accent)">${d.cat} • ${d.trust}</div>
                            <div style="margin: 8px 0; font-weight:600;">${d.title}</div>
                            <div class="price-big">${calculateLandedPrice(d.usd)}</div>
                            <button onclick="smartLaunch('${d.link}')">FAST CHECKOUT</button>
                        </div>
                    `).join('');
                }
                syncLabel.innerText = "Last sync: " + new Date().toLocaleTimeString();
            } catch (e) {
                feed.innerHTML = `<div style="text-align:center; color:var(--glitch);">Offline. Waiting for next GitHub Update...</div>`;
            }
        }

        function calculateLandedPrice(usd) {
            const isBD = document.getElementById('check-bd').checked;
            const isLT = document.getElementById('check-lt').checked;
            
            if (isBD) return "৳" + Math.round(usd * 121 * 1.434).toLocaleString(); // BDT + 43.4% Tax
            if (isLT) return "€" + Math.round(usd * 0.92 * 1.21).toLocaleString(); // EUR + 21% VAT
            return "$" + usd.toLocaleString(); // Global USD
        }

        function smartLaunch(url) {
            const start = Date.now();
            window.location.href = "amzn://apps/android?url=" + encodeURIComponent(url);
            setTimeout(() => { if (Date.now() - start < 1500) window.location.href = url; }, 1000);
        }

        function downloadPassport() {
            const data = { karma: localStorage.getItem('karma') || 10, date: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Glitch_Passport.json"; a.click();
        }

        function restorePassport(e) {
            const reader = new FileReader();
            reader.onload = () => {
                const data = JSON.parse(reader.result);
                localStorage.setItem('karma', data.karma);
                alert("Verified Rank Restored!");
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }

        // Auto-refresh every 5 minutes
        refresh();
        setInterval(refresh, 300000);
    </script>
</body>
</html>
